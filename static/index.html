<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bus Connect - Dashboard Administrativo</title>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <!-- Header -->
        <header class="header glass">
            <div class="logo">
                <div class="logo-icon">🚌</div>
                <div>
                    <h1>Bus Connect</h1>
                    <p>Panel de Administración</p>
                </div>
            </div>
            <div class="header-right">
                <div class="status-badge">
                    <span class="status-dot"></span>
                    Sistema Online
                </div>
                <span class="date-text" id="currentDate"></span>
            </div>
        </header>

        <!-- Stats Cards -->
        <section class="stats-grid">
            <div class="stat-card glass">
                <div class="stat-icon purple">📊</div>
                <div class="stat-content">
                    <span class="stat-value" id="totalViajes">--</span>
                    <span class="stat-label">Total Viajes</span>
                </div>
            </div>
            <div class="stat-card glass">
                <div class="stat-icon green">📅</div>
                <div class="stat-content">
                    <span class="stat-value" id="viajesHoy">--</span>
                    <span class="stat-label">Viajes Hoy</span>
                </div>
            </div>
            <div class="stat-card glass">
                <div class="stat-icon orange">🛤️</div>
                <div class="stat-content">
                    <span class="stat-value" id="rutasActivas">--</span>
                    <span class="stat-label">Rutas Activas</span>
                </div>
            </div>
            <div class="stat-card glass">
                <div class="stat-icon pink">⏱️</div>
                <div class="stat-content">
                    <span class="stat-value" id="tiempoPromedio">--</span>
                    <span class="stat-label">Tiempo Promedio</span>
                </div>
            </div>
        </section>

        <!-- Recent Trips Table -->
        <section class="table-section glass">
            <div class="section-header">
                <h2>Viajes Recientes</h2>
                <button class="refresh-btn" onclick="cargarDatos()">
                    🔄 Actualizar
                </button>
            </div>
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Ruta</th>
                            <th>Bus</th>
                            <th>Inicio</th>
                            <th>Fin</th>
                            <th>Dirección</th>
                            <th>Estado</th>
                        </tr>
                    </thead>
                    <tbody id="tablaViajes">
                        <tr>
                            <td colspan="7" class="loading-text">Cargando viajes...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </section>

        <!-- Footer -->
        <footer class="footer">
            <p>© 2024 Bus Connect - Sistema de Gestión de Transporte UIDE</p>
            <p class="update-time">Última actualización: <span id="lastUpdate">--</span></p>
        </footer>
    </div>

    <script>
        const API_URL = '';

        function formatDate(dateStr) {
            if (!dateStr) return '--';
            const date = new Date(dateStr);
            return date.toLocaleString('es-EC', {
                day: '2-digit',
                month: 'short',
                hour: '2-digit',
                minute: '2-digit'
            });
        }

        async function cargarEstadisticas() {
            try {
                const res = await fetch(`${API_URL}/api/estadisticas`);
                const data = await res.json();

                document.getElementById('totalViajes').textContent = data.total_viajes || 0;
                document.getElementById('viajesHoy').textContent = data.viajes_hoy || 0;
                document.getElementById('rutasActivas').textContent = data.rutas_activas || 0;
                document.getElementById('tiempoPromedio').textContent = data.tiempo_promedio || '--';
            } catch (e) {
                console.error('Error cargando estadísticas:', e);
            }
        }

        async function cargarViajes() {
            try {
                const res = await fetch(`${API_URL}/api/viajes`);
                const data = await res.json();

                const tbody = document.getElementById('tablaViajes');

                if (!data.viajes || data.viajes.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="7" class="no-data">No hay viajes registrados</td></tr>';
                    return;
                }

                tbody.innerHTML = data.viajes.map(viaje => `
                    <tr>
                        <td><span class="id-badge">#${viaje.id}</span></td>
                        <td><span class="route-name">${viaje.nombre_ruta || viaje.route_id || '--'}</span></td>
                        <td>${viaje.bus_id || '--'}</td>
                        <td>${formatDate(viaje.start_time)}</td>
                        <td>${formatDate(viaje.end_time)}</td>
                        <td class="address-cell">${viaje.address || viaje.start_address || '--'}</td>
                        <td>
                            <span class="status-pill ${viaje.end_time ? 'completed' : 'active'}">
                                ${viaje.end_time ? '✓ Completado' : '● En Curso'}
                            </span>
                        </td>
                    </tr>
                `).join('');

            } catch (e) {
                console.error('Error cargando viajes:', e);
                document.getElementById('tablaViajes').innerHTML =
                    '<tr><td colspan="7" class="error-text">Error al cargar datos</td></tr>';
            }
        }

        async function cargarDatos() {
            await Promise.all([cargarEstadisticas(), cargarViajes()]);
            document.getElementById('lastUpdate').textContent =
                new Date().toLocaleTimeString('es-EC');
        }

        function actualizarFecha() {
            const options = { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' };
            document.getElementById('currentDate').textContent =
                new Date().toLocaleDateString('es-EC', options);
        }

        actualizarFecha();
        cargarDatos();
        setInterval(cargarDatos, 30000);
    </script>
</body>

</html>
